services:
  oct-edge-functions:
    build:
      context: .
      dockerfile: Dockerfile
    image: oct-edge-functions:${IMAGE_TAG:-latest}
    container_name: oct-edge-functions-${DENO_ENV:-dev}
    ports:
      - "${HOST_PORT:-18080}:18080"
    env_file:
      - .env
      - .env.${DENO_ENV:-dev}
    environment:
      - PORT=18080
      - DENO_ENV=${DENO_ENV:-development}
    volumes:
      - ./functions:/app/functions
      - ./functions.json:/app/functions.json
      - ./skills.json:/app/skills.json
      - ./.claude/skills:/app/.claude/skills
      - ./skills:/app/skills
      - ./logs:/app/logs
    command: >
      sh -c 'if [ "$$DENO_ENV" = "development" ] || [ "$$DENO_ENV" = "dev" ];
      then deno run --watch --allow-net --allow-env --allow-read --allow-write main.ts;
      else deno run --allow-net --allow-env --allow-read --allow-write main.ts; fi'
    restart: unless-stopped