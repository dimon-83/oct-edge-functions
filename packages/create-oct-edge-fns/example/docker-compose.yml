services:
  example:
    build:
      context: .
      dockerfile: Dockerfile
    image: example:latest
    container_name: example
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - DENO_ENV=${DENO_ENV:-development}
    volumes:
      - ./functions:/app/functions
      - ./plugins:/app/plugins:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD-SHELL",
        "deno eval \"fetch('http://localhost:8080/').catch(() => {}).then(r => Deno.exit(r && r.ok ? 0 : 1))\" || exit 1",
      ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
