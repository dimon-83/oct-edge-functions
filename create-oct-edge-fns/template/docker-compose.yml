services:
  {{PROJECT_NAME}}:
    build:
      context: .
      dockerfile: Dockerfile
    image: {{PROJECT_NAME}}:${IMAGE_TAG:-latest}
    container_name: {{PROJECT_NAME}}-${DENO_ENV:-dev}
    ports:
      - "${HOST_PORT:-{{PORT_DEV}}}:18080"
    # 继承模式：先加载 .env，再用 .env.${DENO_ENV} 覆盖
    env_file:
      - .env
      - .env.${DENO_ENV:-dev}
    environment:
      - PORT=18080
      - DENO_ENV=${DENO_ENV:-development}
    volumes:
      - ./functions:/app/functions
      - ./functions.json:/app/functions.json
      - ./plugins:/app/plugins:ro
      - ./logs:/app/logs
    restart: unless-stopped
